<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">BABBLE.</h1>
      <p class="header-tagline">Talk &amp; Chatter Zine</p>

      <details class="header-right">
        <summary class="profile-avatar">🐧</summary>
        <nav class="brand-dropdown"></nav>
      </details>
    </header>

    <main class="password-edit-main">
      <div class="post-create-heading">
        <span class="sidebar-tag tag-mint">✎ Security</span>
        <h2 class="post-create-title">비밀번호 <span class="title-highlight">수정</span></h2>
      </div>

      <form class="password-edit-form">
        <div class="form-group">
          <label for="current-password"><span class="sidebar-tag tag-pink">CURRENT PASSWORD</span></label>
          <input id="current-password" type="password" placeholder="현재 비밀번호를 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password"><span class="sidebar-tag tag-yellow">NEW PASSWORD</span></label>
          <input id="password" type="password" placeholder="새 비밀번호를 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password-check"><span class="sidebar-tag tag-blue">CONFIRM PASSWORD</span></label>
          <input id="password-check" type="password" placeholder="새 비밀번호를 한번 더 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <button class="primary-button" type="button">수정하기</button>

        <div class="edit-password-complete-toast">
          수정 완료
        </div>
      </form>
    </main>
  </div>

  <script type="module" src="./js/header-menu.js"></script>
  <script type="module" src="./js/password-edit.js"></script>
</body>
</html>
