<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">아무 말 대잔치</h1>

      <details class="profile-menu-wrap">
        <summary class="profile-icon">🐧</summary>

        <nav class="profile-dropdown">
            <a href="./profile-edit.html">회원정보수정</a>
            <a href="./password-edit.html">비밀번호수정</a>
            <a href="./index.html">로그아웃</a>
        </nav>
      </details>
    </header>

    <main class="main">
      <h2 class="section-title">비밀번호 수정</h2>

      <form>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input id="password" type="password" placeholder="비밀번호를 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password-check">비밀번호 확인</label>
          <input id="password-check" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <button class="primary-button" type="button">수정하기</button>

        <div class="edit-password-complete-toast">
          수정 완료
        </div>
      </form>
    </main>
  </div>

  <script src="./js/password-edit.js"></script>
</body>
</html>
