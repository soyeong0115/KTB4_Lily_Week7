<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back-button" href="./index.html">‹</a>
      <h1 class="header-title">BABBLE.</h1>
      <p class="header-tagline">Talk &amp; Chatter Zine</p>

      <details class="header-right">
        <summary class="profile-avatar">🐧</summary>
        <nav class="brand-dropdown"></nav>
      </details>
    </header>

    <main class="signup-main">
      <div class="post-create-heading">
        <span class="sidebar-tag tag-pink">✎ Join Us</span>
        <h2 class="post-create-title">회원<span class="title-highlight">가입</span></h2>
      </div>

      <form class="signup-form">
        <section class="signup-profile-area">
          <label class="profile-image-label"><span class="sidebar-tag tag-lilac">PROFILE IMAGE</span></label>
          <p class="helper-text"></p>

          <input
            id="profileImageInput"
            class="profile-image-input"
            type="file"
            accept="image/*"
          />

          <label class="profile-image" for="profileImageInput">＋</label>
        </section>

        <div class="form-group">
          <label for="email"><span class="sidebar-tag tag-mint">EMAIL*</span></label>
          <input id="email" type="email" placeholder="이메일을 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password"><span class="sidebar-tag tag-yellow">PASSWORD*</span></label>
          <input id="password" type="password" placeholder="비밀번호를 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password-check"><span class="sidebar-tag tag-blue">CONFIRM PASSWORD*</span></label>
          <input id="password-check" type="password" placeholder="비밀번호를 한번 더 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="nickname"><span class="sidebar-tag tag-pink">NICKNAME*</span></label>
          <input id="nickname" type="text" placeholder="닉네임을 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <button class="primary-button" type="button" disabled>회원가입</button>
        <a class="login-link-button" href="./index.html">로그인하러 가기</a>
      </form>
    </main>
  </div>

  <script type="module" src="./js/header-menu.js"></script>
  <script type="module" src="./js/signup.js"></script>
</body>
</html>
