<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세조회</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back-button" href="./posts.html">‹</a>
      <h1 class="header-title">아무 말 대잔치</h1>

      <details class="profile-menu-wrap">
        <summary class="profile-icon">🐧</summary>

        <nav class="profile-dropdown">
            <a href="./profile-edit.html">회원정보수정</a>
            <a href="./password-edit.html">비밀번호수정</a>
            <a href="./index.html">로그아웃</a>
        </nav>
      </details>
    </header>

    <main class="detail">
      <section class="detail-top">
        <div class="detail-info">
          <h2></h2>

          <div class="detail-meta">
            <span class="detail-author"></span>
            <time></time>
          </div>
        </div>

        <div class="small-button-group detail-button-group">
          <a class="small-button" href="./post-edit.html" type="button" id="post-edit-button">수정</a>
          <button class="small-button post-delete-button" type="button" id="post-delete-button">삭제</button>
        </div>
      </section>

      <div class="post-image-box"></div>

      <p class="post-content"></p>

      <section class="post-stats">
        <div class="stat-box" id="post-like-button" type="button">
          <strong></strong>
          <span>좋아요수</span>
        </div>

        <div class="stat-box">
          <strong></strong>
          <span>조회수</span>
        </div>

        <div class="stat-box">
          <strong></strong>
          <span>댓글</span>
        </div>
      </section>

      <section class="comment-form">
        <textarea placeholder="댓글을 남겨주세요!"></textarea>

        <div class="comment-form-bottom">
          <button class="comment-submit" type="button">댓글 등록</button>
        </div>
      </section>

      <section class="comment-list"></section>
    </main>
  </div>

  <script src="./js/comment.js"></script>
  <script src="./js/post-detail.js"></script>
</body>
</html>
