<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세조회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back-button" href="./posts.html">‹</a>
      <h1 class="header-title">BABBLE.</h1>
      <p class="header-tagline">Talk &amp; Chatter Zine</p>

      <details class="header-right">
        <summary class="profile-avatar">🐧</summary>
        <nav class="brand-dropdown"></nav>
      </details>
    </header>

    <main class="detail">
      <section class="detail-top">
        <div class="detail-info">
          <h2></h2>

          <div class="detail-meta">
            <span class="detail-avatar"></span>
            <span class="detail-author"></span>
            <time></time>
          </div>
        </div>

        <div class="small-button-group detail-button-group">
          <a class="small-button" type="button" id="post-edit-button">수정</a>
          <button class="small-button post-delete-button" type="button" id="post-delete-button">삭제</button>
        </div>
      </section>

      <div class="post-image-box"></div>

      <p class="post-content"></p>

      <section class="post-stats">
        <div class="stat-box" id="post-like-button" type="button">
          <strong></strong>
          <span>좋아요</span>
        </div>

        <div class="stat-box">
          <strong></strong>
          <span>조회수</span>
        </div>

        <div class="stat-box">
          <strong></strong>
          <span>댓글</span>
        </div>
      </section>

      <section class="comment-form">
        <span class="sidebar-tag tag-pink comment-form-tag">Comment</span>
        <textarea placeholder="댓글을 남겨주세요!"></textarea>

        <div class="comment-form-bottom">
          <button class="comment-submit" type="button">댓글 등록</button>
        </div>
      </section>

      <section class="comment-list"></section>
    </main>
  </div>

  <script type="module" src="./js/header-menu.js"></script>
  <script type="module" src="./js/comment.js"></script>
  <script type="module" src="./js/post-detail.js"></script>
</body>
</html>
