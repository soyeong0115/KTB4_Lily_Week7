<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">BABBLE.</h1>
      <p class="header-tagline">Talk &amp; Chatter Zine</p>

      <details class="header-right">
        <summary class="profile-avatar">🐧</summary>
        <nav class="brand-dropdown"></nav>
      </details>
    </header>

    <main class="login-main">
      <div class="post-create-heading">
        <span class="sidebar-tag tag-yellow">✎ Welcome Back</span>
        <h2 class="post-create-title"><span class="title-highlight">로그인</span></h2>
      </div>

      <form class="login-form">
        <div class="form-group">
          <label for="email"><span class="sidebar-tag tag-mint">EMAIL</span></label>
          <input id="email" type="email" placeholder="이메일을 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <div class="form-group">
          <label for="password"><span class="sidebar-tag tag-pink">PASSWORD</span></label>
          <input id="password" type="password" placeholder="비밀번호를 입력하세요" />
          <p class="helper-text"></p>
        </div>

        <button id="login-button" class="primary-button" type="button" disabled>로그인</button>
        <a class="text-link" href="./signup.html">회원가입</a>
      </form>
    </main>
  </div>

  <script type="module" src="./js/header-menu.js"></script>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
