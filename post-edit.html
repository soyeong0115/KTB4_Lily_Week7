<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 수정</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back-button" href="./post-detail.html">‹</a>
      <h1 class="header-title">아무 말 대잔치</h1>

      <details class="profile-menu-wrap">
        <summary class="profile-icon">🐧</summary>

        <nav class="profile-dropdown">
            <a href="./profile-edit.html">회원정보수정</a>
            <a href="./password-edit.html">비밀번호수정</a>
            <a href="./index.html">로그아웃</a>
        </nav>
      </details>
    </header>

    <main class="post-create-main">
      <h2 class="post-create-title">게시글 수정</h2>

      <form class="post-create-form">
        <div class="post-form-group">
          <label for="title">제목*</label>
          <input 
            id="title" 
            type="text" 
            maxlength="26"
            required
            placeholder="제목을 입력해주세요. (최대 26글자)"
          />
        </div>

        <div class="post-form-group">
          <label for="content">내용*</label>
          <textarea 
            id="content" 
            required
            placeholder="내용을 입력해주세요."
          ></textarea>
          <p class="helper-text"></p>
        </div>

        <div class="post-form-group image-group">
          <label>이미지</label>

          <div class="file-row">
            <button class="file-button" type="button">파일 선택</button>
            <span>기존 파일 명</span>
          </div>
        </div>

        <button class="post-submit-button" type="button">수정하기</button>
      </form>
    </main>
  </div>

  <script type="module" src="./js/post-edit.js"></script>
</body>
</html>
