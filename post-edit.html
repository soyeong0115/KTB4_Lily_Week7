<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 수정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back-button" href="./post-detail.html">‹</a>
      <h1 class="header-title">BABBLE.</h1>
      <p class="header-tagline">Talk &amp; Chatter Zine</p>

      <details class="header-right">
        <summary class="profile-avatar">🐧</summary>
        <nav class="brand-dropdown"></nav>
      </details>
    </header>

    <main class="post-create-main">
      <div class="post-create-heading">
        <span class="sidebar-tag tag-pink">✎ Edit Post</span>
        <h2 class="post-create-title">게시글 <span class="title-highlight">수정</span></h2>
      </div>

      <form class="post-create-form">
        <div class="post-form-group">
          <label for="title">제목*</label>
          <input 
            id="title" 
            type="text" 
            maxlength="26"
            required
            placeholder="제목을 입력해주세요. (최대 26글자)"
          />
        </div>

        <div class="post-form-group">
          <label for="content">내용*</label>
          <textarea 
            id="content" 
            required
            placeholder="내용을 입력해주세요."
          ></textarea>
          <p class="helper-text"></p>
        </div>

        <div class="post-form-group image-group">
          <label>이미지</label>

          <div class="file-row">
            <button class="file-button" type="button">파일 선택</button>
            <span>파일을 선택해주세요.</span>
            <input id="postImageInput" type="file" accept="image/*" hidden />
          </div>
        </div>

        <button class="post-submit-button" type="button">수정하기</button>
      </form>
    </main>
  </div>

  <script type="module" src="./js/header-menu.js"></script>
  <script type="module" src="./js/post-edit.js"></script>
</body>
</html>
