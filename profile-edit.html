<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원정보수정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">BABBLE.</h1>
      <p class="header-tagline">Talk &amp; Chatter Zine</p>

      <details class="header-right">
        <summary class="profile-avatar">🐧</summary>
        <nav class="brand-dropdown"></nav>
      </details>
    </header>

    <main class="profile-edit-main">
      <div class="post-create-heading">
        <span class="sidebar-tag tag-blue">✎ My Profile</span>
        <h2 class="post-create-title">회원정보 <span class="title-highlight">수정</span></h2>
      </div>

      <form class="profile-edit-form">
        <section class="profile-edit-image-area">
          <label class="profile-edit-label"><span class="sidebar-tag tag-pink">PROFILE IMAGE</span></label>

          <input
            id="profileImageInput"
            class="profile-image-input"
            type="file"
            accept="image/*"
          />

          <label class="profile-edit-image" for="profileImageInput">
            <div class="profile-edit-photo"></div>
            <span>변경</span>
          </label>
        </section>

        <div class="profile-edit-field">
          <label for="email"><span class="sidebar-tag tag-mint">EMAIL</span></label>
          <p id="email"></p>
        </div>

        <div class="profile-edit-field">
          <label for="nickname"><span class="sidebar-tag tag-yellow">NICKNAME</span></label>
          <input id="nickname" type="text" />
          <p class="profile-helper-text"></p>
        </div>

        <button class="profile-submit-button" type="button">수정하기</button>

        <button class="profile-withdraw-button" type="button">
          회원 탈퇴
        </button>

        <div class="profile-complete-toast">
          수정완료
        </div>
      </form>
    </main>
  </div>

  <script type="module" src="./js/header-menu.js"></script>
  <script type="module" src="./js/profile-edit.js"></script>
</body>
</html>
