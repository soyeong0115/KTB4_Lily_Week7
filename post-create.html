<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 추가</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back-button" href="./posts.html">‹</a>
      <h1 class="header-title">아무 말 대잔치</h1>

      <div class="profile-menu-wrap">
        <div class="profile-icon">🐧</div>
      </div>
    </header>

    <main class="post-create-main">
      <h2 class="post-create-title">게시글 작성</h2>

      <form class="post-create-form">
        <div class="post-form-group">
          <label for="title">제목*</label>
          <input 
            id="title" 
            type="text" 
            maxlength="26"
            required
            placeholder="제목을 입력해주세요. (최대 26글자)" 
          />
        </div>

        <div class="post-form-group">
          <label for="content">내용*</label>
          <textarea 
            id="content" 
            required
            placeholder="내용을 입력해주세요."
          ></textarea>
          <p class="helper-text"></p>
        </div>

        <div class="post-form-group image-group">
          <label>이미지</label>

          <div class="file-row">
            <button class="file-button" type="button">파일 선택</button>
            <span>파일을 선택해주세요.</span>
          </div>
        </div>

        <button class="post-submit-button" type="button" disabled>완료</button>
      </form>
    </main>
  </div>
</body>
</html>
